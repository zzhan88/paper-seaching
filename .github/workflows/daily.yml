name: 每日文献推送

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-paper-push:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: deepseek-chat
      QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
      QQ_EMAIL_AUTH_CODE: ${{ secrets.QQ_EMAIL_AUTH_CODE }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python run_all.py

      - name: Save seen papers to repo
        run: |
          git config user.name "paper-bot"
          git config user.email "bot@example.com"
          git add output/seen_papers.json
          git diff --staged --quiet || git commit -m "update seen papers [skip ci]"
          git push
